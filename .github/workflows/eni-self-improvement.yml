name: ENI Auto Execute + Redeploy
on:
  push:
    paths:
      - 'control_center.py'
jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render Redeploy
        run: curl -X POST -H "Authorization: Bearer ${{ secrets.RENDER_DEPLOY_HOOK }}" https://api.render.com/deploy/srv-...
